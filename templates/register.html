<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 栖云阁</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <canvas id="particleCanvas"></canvas>

    <div class="login-container">
        <div class="login-card register-card">
            <div class="login-logo">
                <div class="logo-icon register-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                </div>
                <h1>注册新账号</h1>
                <p class="login-subtitle">提交申请后需等待管理员审批</p>
            </div>

            <form id="registerForm" class="login-form">
                <div class="input-group">
                    <div class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <input type="text" id="username" name="username" placeholder="用户名 (3-20个字符)" required autocomplete="off">
                    <div class="input-line"></div>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </div>
                    <input type="email" id="email" name="email" placeholder="邮箱 (选填)" autocomplete="off">
                    <div class="input-line"></div>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                    <input type="password" id="password" name="password" placeholder="密码 (至少6个字符)" required>
                    <div class="input-line"></div>
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </div>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="确认密码" required>
                    <div class="input-line"></div>
                </div>

                <div class="input-group textarea-group">
                    <div class="input-icon textarea-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                    </div>
                    <textarea id="message" name="message" placeholder="申请备注 (选填，可说明注册用途)" rows="3"></textarea>
                </div>

                <div id="registerMessage" class="error-message"></div>

                <button type="submit" class="login-btn register-btn">
                    <span class="btn-text">提交注册申请</span>
                </button>
            </form>

            <div class="login-footer">
                <span>已有账号？</span>
                <a href="{{ url_for('login') }}" class="register-link">返回登录</a>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
    <script src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>
</html>
