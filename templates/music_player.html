<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐播放器 - 悦己</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* ========== 全局与布局 ========== */
        :root {
            --mp-bg: #0f1419;
            --mp-card: #1a1f2e;
            --mp-card-hover: #22283a;
            --mp-border: rgba(255,255,255,0.06);
            --mp-primary: #6366f1;
            --mp-secondary: #8b5cf6;
            --mp-text: #e2e8f0;
            --mp-gray: #94a3b8;
            --mp-dark-3: #0b0f17;
        }

        .music-page-wrapper {
            display: flex;
            height: calc(100vh - 64px);
            overflow: hidden;
        }

        /* ========== 左侧音乐导航 ========== */
        .mp-sidebar {
            width: 240px;
            background: linear-gradient(180deg, rgba(99,102,241,0.08), rgba(139,92,246,0.04));
            border-right: 1px solid var(--mp-border);
            display: flex;
            flex-direction: column;
            padding: 20px 12px;
            gap: 8px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .mp-sidebar::-webkit-scrollbar { width: 4px; }
        .mp-sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        .mp-sidebar-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--mp-text);
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 8px 16px;
            border-bottom: 1px solid var(--mp-border);
            margin-bottom: 4px;
        }

        .mp-nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            color: var(--mp-gray);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
        }

        .mp-nav-item:hover {
            background: rgba(255,255,255,0.04);
            color: var(--mp-text);
        }

        .mp-nav-item.active {
            background: linear-gradient(135deg, rgba(99,102,241,0.35), rgba(139,92,246,0.25));
            color: #fff;
            box-shadow: 0 4px 15px rgba(99,102,241,0.2);
        }

        /* ========== 右侧主内容 ========== */
        .mp-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--mp-bg);
            overflow: hidden;
            position: relative;
        }

        .mp-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
        }

        .mp-content::-webkit-scrollbar { width: 6px; }
        .mp-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .mp-page-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--mp-text);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ========== 搜索框 ========== */
        .mp-search-wrap {
            position: relative;
            max-width: 480px;
            margin-bottom: 24px;
        }

        .mp-search-wrap input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            background: var(--mp-card);
            border: 1px solid var(--mp-border);
            border-radius: 12px;
            color: var(--mp-text);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .mp-search-wrap input:focus {
            border-color: var(--mp-primary);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        .mp-search-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--mp-gray);
        }

        /* ========== 卡片与列表 ========== */
        .mp-section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--mp-text);
            margin: 24px 0 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mp-cards-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .mp-cards-scroll::-webkit-scrollbar { height: 4px; }
        .mp-cards-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .mp-song-card {
            min-width: 160px;
            max-width: 160px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .mp-song-card:hover { transform: translateY(-4px); }

        .mp-song-card .cover {
            width: 160px;
            height: 160px;
            border-radius: 12px;
            object-fit: cover;
            background: var(--mp-card);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .mp-song-card .name {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--mp-text);
            margin-top: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mp-song-card .artist {
            font-size: 0.75rem;
            color: var(--mp-gray);
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mp-rank-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .mp-rank-card {
            background: var(--mp-card);
            border: 1px solid var(--mp-border);
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mp-rank-card:hover {
            background: var(--mp-card-hover);
            border-color: rgba(99,102,241,0.3);
            transform: translateY(-2px);
        }

        .mp-rank-card .icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--mp-primary), var(--mp-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            margin-bottom: 12px;
        }

        .mp-rank-card .title { font-size: 0.95rem; font-weight: 600; color: var(--mp-text); }
        .mp-rank-card .desc { font-size: 0.8rem; color: var(--mp-gray); margin-top: 4px; }

        /* ========== 歌曲列表 ========== */
        .mp-song-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .mp-song-row {
            display: grid;
            grid-template-columns: 40px 48px 1fr 140px 80px 44px 44px;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mp-song-row:hover { background: var(--mp-card-hover); }

        .mp-song-row.playing {
            background: linear-gradient(90deg, rgba(99,102,241,0.2), rgba(139,92,246,0.1));
            border: 1px solid rgba(99,102,241,0.25);
        }

        .mp-song-row .idx {
            font-size: 0.85rem;
            color: var(--mp-gray);
            text-align: center;
        }

        .mp-song-row.playing .idx {
            color: var(--mp-primary);
            font-weight: 700;
        }

        .mp-song-row .row-cover {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            object-fit: cover;
            background: var(--mp-card);
        }

        .mp-song-row .row-name {
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--mp-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mp-song-row .row-artist {
            font-size: 0.8rem;
            color: var(--mp-gray);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mp-song-row .row-duration {
            font-size: 0.8rem;
            color: var(--mp-gray);
            text-align: right;
        }

        .mp-song-row .row-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            color: var(--mp-gray);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mp-song-row .row-btn:hover {
            background: rgba(255,255,255,0.06);
            color: var(--mp-text);
        }

        .mp-song-row .row-btn.favorited { color: #ef4444; }

        /* ========== 歌单网格 ========== */
        .mp-playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .mp-playlist-card {
            background: var(--mp-card);
            border: 1px solid var(--mp-border);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mp-playlist-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99,102,241,0.3);
            box-shadow: 0 12px 32px rgba(0,0,0,0.3);
        }

        .mp-playlist-card .pl-cover {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: linear-gradient(135deg, var(--mp-primary), var(--mp-secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 2.5rem;
        }

        .mp-playlist-card .pl-info { padding: 14px; }
        .mp-playlist-card .pl-name {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--mp-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .mp-playlist-card .pl-meta {
            font-size: 0.78rem;
            color: var(--mp-gray);
            margin-top: 6px;
            display: flex;
            justify-content: space-between;
        }

        /* ========== 标签切换 ========== */
        .mp-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mp-tab {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid var(--mp-border);
            background: var(--mp-card);
            color: var(--mp-gray);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .mp-tab:hover { background: var(--mp-card-hover); color: var(--mp-text); }
        .mp-tab.active {
            background: linear-gradient(135deg, var(--mp-primary), var(--mp-secondary));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(99,102,241,0.3);
        }

        /* ========== 播放详情面板 ========== */
        .mp-detail-panel {
            position: absolute;
            inset: 0;
            background: rgba(15,20,25,0.98);
            backdrop-filter: blur(30px);
            z-index: 50;
            display: none;
            padding: 32px 40px;
            overflow-y: auto;
        }

        .mp-detail-panel.show { display: block; }

        .mp-detail-close {
            position: absolute;
            top: 20px;
            right: 24px;
            width: 36px;
            height: 36px;
            border: none;
            background: var(--mp-card);
            color: var(--mp-gray);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .mp-detail-close:hover { background: var(--mp-card-hover); color: var(--mp-text); }

        .mp-detail-body {
            display: flex;
            gap: 48px;
            max-width: 1000px;
            margin: 0 auto;
            align-items: flex-start;
            padding-top: 20px;
        }

        .mp-detail-left {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            flex-shrink: 0;
        }

        .mp-detail-cover {
            width: 280px;
            height: 280px;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .mp-detail-cover.playing {
            animation: spin 24s linear infinite;
            border-radius: 50%;
        }

        .mp-detail-info { text-align: center; }
        .mp-detail-info .name { font-size: 1.4rem; font-weight: 700; color: var(--mp-text); }
        .mp-detail-info .artist { font-size: 1rem; color: var(--mp-gray); margin-top: 8px; }
        .mp-detail-info .album { font-size: 0.85rem; color: var(--mp-gray); margin-top: 4px; opacity: 0.7; }

        .mp-detail-right {
            flex: 1;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 8px;
        }

        .mp-detail-right::-webkit-scrollbar { width: 4px; }
        .mp-detail-right::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .mp-lyric-line {
            font-size: 0.95rem;
            color: var(--mp-gray);
            padding: 10px 0;
            text-align: center;
            transition: all 0.4s ease;
            line-height: 1.6;
        }

        .mp-lyric-line.active {
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--mp-primary);
            text-shadow: 0 0 20px rgba(99,102,241,0.3);
        }

        .mp-lyric-empty {
            text-align: center;
            color: var(--mp-gray);
            padding: 60px 20px;
            font-size: 0.9rem;
        }

        /* ========== 按钮与表单 ========== */
        .mp-btn-primary {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--mp-primary), var(--mp-secondary));
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .mp-btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(99,102,241,0.35);
        }

        .mp-btn-danger {
            padding: 8px 16px;
            background: rgba(239,68,68,0.15);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .mp-btn-danger:hover { background: rgba(239,68,68,0.25); }

        .mp-btn-ghost {
            padding: 8px 16px;
            background: none;
            color: var(--mp-gray);
            border: 1px solid var(--mp-border);
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .mp-btn-ghost:hover { background: rgba(255,255,255,0.04); color: var(--mp-text); }

        /* ========== 弹窗 ========== */
        .mp-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .mp-modal-overlay.show { display: flex; }

        .mp-modal {
            background: var(--mp-card);
            border: 1px solid var(--mp-border);
            border-radius: 16px;
            padding: 24px;
            min-width: 320px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
        }

        .mp-modal h3 { font-size: 1.1rem; font-weight: 600; color: var(--mp-text); margin-bottom: 16px; }
        .mp-modal input {
            width: 100%;
            padding: 12px 14px;
            background: var(--mp-bg);
            border: 1px solid var(--mp-border);
            border-radius: 10px;
            color: var(--mp-text);
            font-size: 0.9rem;
            outline: none;
            margin-bottom: 16px;
        }
        .mp-modal input:focus { border-color: var(--mp-primary); }

        .mp-modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

        .mp-playlist-select-item {
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--mp-text);
            font-size: 0.9rem;
        }
        .mp-playlist-select-item:hover { background: var(--mp-card-hover); }

        /* ========== 空状态 ========== */
        .mp-empty {
            text-align: center;
            color: var(--mp-gray);
            padding: 60px 20px;
        }
        .mp-empty svg { opacity: 0.3; margin-bottom: 16px; }

        /* ========== 响应式 ========== */
        @media (max-width: 900px) {
            .music-page-wrapper { flex-direction: column; height: auto; }
            .mp-sidebar {
                width: 100%;
                flex-direction: row;
                overflow-x: auto;
                padding: 12px;
                border-right: none;
                border-bottom: 1px solid var(--mp-border);
            }
            .mp-sidebar-title { display: none; }
            .mp-nav-item { white-space: nowrap; width: auto; padding: 8px 14px; }
            .mp-rank-grid { grid-template-columns: repeat(2, 1fr); }
            .mp-detail-body { flex-direction: column; align-items: center; }
            .mp-detail-right { width: 100%; max-height: 300px; }
            .mp-song-row { grid-template-columns: 30px 40px 1fr 60px 36px 36px; }
            .mp-song-row .row-artist { display: none; }

        }

        @media (max-width: 600px) {
            .mp-song-row { grid-template-columns: 30px 1fr 50px 36px; }
            .mp-song-row .row-cover, .mp-song-row .row-btn:last-child { display: none; }
            .mp-rank-grid { grid-template-columns: 1fr; }
            .mp-content { padding: 16px; }
        }
    </style>
</head>
<body class="app-page">
    <!-- 全局侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="sidebar-title">悦己</span>
        </div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span>我的主页</span>
            </a>
            <a href="{{ url_for('entertainment') }}" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
                <span>娱乐板块</span>
            </a>
            <a href="{{ url_for('profile') }}" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                </svg>
                <span>个人信息</span>
            </a>
            {% if session.get('role') == 'admin' %}
            <a href="{{ url_for('admin') }}" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span>管理面板</span>
            </a>
            {% endif %}
        </nav>
        <div class="sidebar-footer">
            <a href="{{ url_for('logout') }}" class="nav-item logout-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>退出登录</span>
            </a>
        </div>
    </aside>

    <main class="main-content">
        <!-- 顶栏 -->
        <header class="top-bar">
            <div class="top-bar-left">
                <a href="{{ url_for('entertainment') }}" class="back-link" style="display: inline-flex; align-items: center; gap: 8px; color: var(--gray); text-decoration: none;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    返回娱乐板块
                </a>
            </div>
            <div class="top-bar-right">
                <div class="user-badge" style="background: {{ session.get('avatar_color', '#6366f1') }}">
                    {{ session.get('username', 'U')[0].upper() }}
                </div>
            </div>
        </header>

        <div class="music-page-wrapper">
            <!-- 左侧音乐导航 -->
            <nav class="mp-sidebar">
                <div class="mp-sidebar-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                    音乐播放器
                </div>
                <button class="mp-nav-item active" data-page="recommend" onclick="switchPage('recommend')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                    推荐音乐
                </button>
                <button class="mp-nav-item" data-page="search" onclick="switchPage('search')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    搜索歌曲
                </button>
                <button class="mp-nav-item" data-page="ranking" onclick="switchPage('ranking')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>
                    </svg>
                    排行榜
                </button>
                <button class="mp-nav-item" data-page="playlists" onclick="switchPage('playlists')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                    我的歌单
                </button>
                <button class="mp-nav-item" data-page="favorites" onclick="switchPage('favorites')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                    </svg>
                    我的收藏
                </button>
                <button class="mp-nav-item" data-page="history" onclick="switchPage('history')">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    播放历史
                </button>
            </nav>

            <!-- 右侧主内容 -->
            <div class="mp-main">
                <div class="mp-content" id="mpContent">
                    <!-- 动态内容区域 -->
                </div>

                <!-- 播放详情面板 -->
                <div class="mp-detail-panel" id="detailPanel">
                    <button class="mp-detail-close" onclick="toggleDetailPanel(false)">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                    <div class="mp-detail-body">
                        <div class="mp-detail-left">
                            <img class="mp-detail-cover" id="detailCover" src="" alt="">
                            <div class="mp-detail-info">
                                <div class="name" id="detailName">--</div>
                                <div class="artist" id="detailArtist">--</div>
                                <div class="album" id="detailAlbum">--</div>
                            </div>
                        </div>
                        <div class="mp-detail-right" id="lyricContainer">
                            <div class="mp-lyric-empty">暂无歌词</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 弹窗 -->
    <div class="mp-modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
        <div class="mp-modal" id="modalContent"></div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/floating_player.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ajax_nav.js') }}"></script>
    <script>
        // ==================== 全局状态 ====================
        let currentPage = 'recommend';
        let currentPlaylist = [];
        let currentSongIndex = -1;
        let currentSong = null;
        let isPlaying = false;
        let playMode = 'order'; // order, random, single
        let favorites = [];
        let playlists = [];
        let lyrics = [];
        let searchTimer = null;
        let searchKeyword = '';

        const contentEl = document.getElementById('mpContent');
        const detailPanel = document.getElementById('detailPanel');

        // ==================== 页面导航 ====================
        function switchPage(page) {
            currentPage = page;
            document.querySelectorAll('.mp-nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`.mp-nav-item[data-page="${page}"]`)?.classList.add('active');

            switch (page) {
                case 'recommend': renderRecommend(); break;
                case 'search': renderSearch(); break;
                case 'ranking': renderRanking(); break;
                case 'playlists': renderPlaylists(); break;
                case 'favorites': renderFavorites(); break;
                case 'history': renderHistory(); break;
            }
        }

        // ==================== 推荐页 ====================
        async function renderRecommend() {
            contentEl.innerHTML = `
                <div class="mp-page-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                    推荐音乐
                </div>
                <div class="mp-search-wrap">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" placeholder="搜索歌曲、歌手、专辑..." onkeydown="if(event.key==='Enter'){searchKeyword=this.value;switchPage('search');doSearch();}">
                </div>
                <div class="mp-section-title">热门推荐</div>
                <div class="mp-cards-scroll" id="hotRecs">
                    <div class="mp-empty" style="padding:20px 0;"><span style="color:var(--mp-gray);">加载中...</span></div>
                </div>
                <div class="mp-section-title">排行榜速览</div>
                <div class="mp-rank-grid" id="rankPreview">
                    <div class="mp-rank-card" onclick="switchPage('ranking');loadRanking('hot')">
                        <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></div>
                        <div class="title">飙升榜</div>
                        <div class="desc">今日上升最快</div>
                    </div>
                    <div class="mp-rank-card" onclick="switchPage('ranking');loadRanking('new')">
                        <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
                        <div class="title">新歌榜</div>
                        <div class="desc">最新发布单曲</div>
                    </div>
                    <div class="mp-rank-card" onclick="switchPage('ranking');loadRanking('pop')">
                        <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg></div>
                        <div class="title">热歌榜</div>
                        <div class="desc">全网最火歌曲</div>
                    </div>
                    <div class="mp-rank-card" onclick="switchPage('ranking');loadRanking('classic')">
                        <div class="icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg></div>
                        <div class="title">经典榜</div>
                        <div class="desc"> timeless 经典</div>
                    </div>
                </div>
            `;
            try {
                const resp = await fetch('/music/api/ranking?type=hot');
                const data = await resp.json();
                if (data.success && data.songs) {
                    const container = document.getElementById('hotRecs');
                    container.innerHTML = data.songs.slice(0, 10).map((song, i) => `
                        <div class="mp-song-card" onclick='playSong(${JSON.stringify(song).replace(/'/g, "&#39;")}, ${JSON.stringify(data.songs).replace(/'/g, "&#39;")})'>
                            <img class="cover" src="${song.cover || ''}" alt="" onerror="this.style.visibility='hidden'">
                            <div class="name">${song.name}</div>
                            <div class="artist">${song.artist}</div>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error('加载推荐失败', e); }
        }

        // ==================== 搜索页 ====================
        function renderSearch() {
            contentEl.innerHTML = `
                <div class="mp-page-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    搜索歌曲
                </div>
                <div class="mp-search-wrap">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索歌曲、歌手、专辑..." value="${searchKeyword}" oninput="onSearchInput(this.value)">
                </div>
                <div id="searchResultArea"></div>
            `;
            if (searchKeyword) doSearch();
        }

        function onSearchInput(val) {
            clearTimeout(searchTimer);
            searchKeyword = val.trim();
            if (!searchKeyword) {
                document.getElementById('searchResultArea').innerHTML = '';
                return;
            }
            searchTimer = setTimeout(doSearch, 400);
        }

        async function doSearch() {
            const area = document.getElementById('searchResultArea');
            if (!area) return;
            area.innerHTML = '<div class="mp-empty" style="padding:40px 0;">搜索中...</div>';
            try {
                const resp = await fetch('/music/api/search?q=' + encodeURIComponent(searchKeyword));
                const data = await resp.json();
                if (data.success && data.songs && data.songs.length > 0) {
                    currentPlaylist = data.songs;
                    area.innerHTML = `
                        <div style="color:var(--mp-gray);font-size:0.85rem;margin-bottom:12px;">找到 ${data.songs.length} 首歌曲</div>
                        <div class="mp-song-list">${renderSongRows(data.songs)}</div>
                    `;
                } else {
                    area.innerHTML = '<div class="mp-empty">未找到相关歌曲</div>';
                }
            } catch (e) {
                area.innerHTML = '<div class="mp-empty">搜索失败，请重试</div>';
            }
        }

        // ==================== 排行榜页 ====================
        function renderRanking() {
            contentEl.innerHTML = `
                <div class="mp-page-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>
                    </svg>
                    排行榜
                </div>
                <div class="mp-tabs">
                    <button class="mp-tab active" data-rank="hot" onclick="loadRanking('hot')">飙升榜</button>
                    <button class="mp-tab" data-rank="new" onclick="loadRanking('new')">新歌榜</button>
                    <button class="mp-tab" data-rank="pop" onclick="loadRanking('pop')">热歌榜</button>
                    <button class="mp-tab" data-rank="classic" onclick="loadRanking('classic')">经典榜</button>
                    <button class="mp-tab" data-rank="electronic" onclick="loadRanking('electronic')">电子榜</button>
                    <button class="mp-tab" data-rank="uk" onclick="loadRanking('uk')">UK榜</button>
                </div>
                <div id="rankingArea"></div>
            `;
            loadRanking('hot');
        }

        async function loadRanking(type) {
            document.querySelectorAll('.mp-tab').forEach(t => t.classList.toggle('active', t.dataset.rank === type));
            const area = document.getElementById('rankingArea');
            if (area) area.innerHTML = '<div class="mp-empty" style="padding:40px 0;">加载中...</div>';
            try {
                const resp = await fetch('/music/api/ranking?type=' + type);
                const data = await resp.json();
                if (data.success && data.songs) {
                    currentPlaylist = data.songs;
                    if (area) area.innerHTML = `<div class="mp-song-list">${renderSongRows(data.songs)}</div>`;
                } else {
                    if (area) area.innerHTML = '<div class="mp-empty">暂无数据</div>';
                }
            } catch (e) {
                if (area) area.innerHTML = '<div class="mp-empty">加载失败</div>';
            }
        }

        // ==================== 我的歌单 ====================
        async function renderPlaylists() {
            contentEl.innerHTML = `
                <div class="mp-page-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18V5l12-2v13"/>
                        <circle cx="6" cy="18" r="3"/>
                        <circle cx="18" cy="16" r="3"/>
                    </svg>
                    我的歌单
                    <button class="mp-btn-primary" style="margin-left:auto;" onclick="createPlaylist()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        新建歌单
                    </button>
                </div>
                <div id="playlistArea"></div>
            `;
            await loadPlaylists();
        }

        async function loadPlaylists() {
            const area = document.getElementById('playlistArea');
            try {
                const resp = await fetch('/music/api/playlists');
                const data = await resp.json();
                playlists = data.playlists || [];
                if (playlists.length === 0) {
                    area.innerHTML = '<div class="mp-empty">暂无歌单，点击上方按钮创建</div>';
                    return;
                }
                area.innerHTML = `
                    <div class="mp-playlist-grid">
                        ${playlists.map(pl => `
                            <div class="mp-playlist-card" onclick="showPlaylistDetail(${pl.id})">
                                <div class="pl-cover">
                                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                        <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
                                    </svg>
                                </div>
                                <div class="pl-info">
                                    <div class="pl-name">${pl.name || '未命名歌单'}</div>
                                    <div class="pl-meta">
                                        <span>${pl.song_count || 0} 首</span>
                                        <span>${pl.updated_at ? pl.updated_at.slice(0,10) : ''}</span>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) {
                area.innerHTML = '<div class="mp-empty">加载失败</div>';
            }
        }

        async function showPlaylistDetail(id) {
            try {
                const resp = await fetch('/music/api/playlists/' + id);
                const data = await resp.json();
                const pl = data.playlist;
                const songs = data.songs || [];
                contentEl.innerHTML = `
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
                        <button class="mp-btn-ghost" onclick="switchPage('playlists')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                            返回
                        </button>
                        <div class="mp-page-title" style="margin:0;">${pl.name || '歌单详情'}</div>
                        <button class="mp-btn-danger" style="margin-left:auto;" onclick="deletePlaylist(${id})">删除歌单</button>
                    </div>
                    <div class="mp-song-list">${renderSongRows(songs, true, id)}</div>
                `;
            } catch (e) {
                alert('加载歌单详情失败');
            }
        }

        async function createPlaylist() {
            const name = prompt('请输入歌单名称：');
            if (!name || !name.trim()) return;
            try {
                const resp = await fetch('/music/api/playlists', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name.trim() })
                });
                const data = await resp.json();
                if (data.success) {
                    await loadPlaylists();
                } else {
                    alert(data.message || '创建失败');
                }
            } catch (e) { alert('创建失败'); }
        }

        async function deletePlaylist(id) {
            if (!confirm('确定要删除这个歌单吗？')) return;
            try {
                const resp = await fetch('/music/api/playlists/' + id, { method: 'DELETE' });
                const data = await resp.json();
                if (data.success) switchPage('playlists');
                else alert(data.message || '删除失败');
            } catch (e) { alert('删除失败'); }
        }

        async function addToPlaylist(song, playlistId) {
            try {
                const resp = await fetch(`/music/api/playlists/${playlistId}/songs`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ song_id: song.id, song_name: song.name, artist: song.artist, album: song.album, cover_url: song.cover, duration: song.duration })
                });
                const data = await resp.json();
                if (data.success) { closeModal(); alert('已添加到歌单'); }
                else alert(data.message || '添加失败');
            } catch (e) { alert('添加失败'); }
        }

        async function removeFromPlaylist(songId, playlistId) {
            try {
                const resp = await fetch(`/music/api/playlists/${playlistId}/songs`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ song_id: songId })
                });
                const data = await resp.json();
                if (data.success) showPlaylistDetail(playlistId);
            } catch (e) { alert('移除失败'); }
        }

        function showAddToPlaylistModal(song) {
            if (playlists.length === 0) {
                alert('请先创建歌单');
                return;
            }
            document.getElementById('modalContent').innerHTML = `
                <h3>添加到歌单</h3>
                <div style="display:flex;flex-direction:column;gap:4px;">
                    ${playlists.map(pl => `
                        <div class="mp-playlist-select-item" onclick='addToPlaylist(${JSON.stringify(song).replace(/'/g, "&#39;")}, ${pl.id})'>
                            ${pl.name || '未命名歌单'} (${pl.song_count || 0}首)
                        </div>
                    `).join('')}
                </div>
                <div class="mp-modal-actions" style="margin-top:16px;">
                    <button class="mp-btn-ghost" onclick="closeModal()">取消</button>
                </div>
            `;
            document.getElementById('modalOverlay').classList.add('show');
        }

        // ==================== 我的收藏 ====================
        async function renderFavorites() {
            contentEl.innerHTML = `
                <div class="mp-page-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
                    </svg>
                    我的收藏
                </div>
                <div id="favArea"></div>
            `;
            await loadFavorites();
        }

        async function loadFavorites() {
            const area = document.getElementById('favArea');
            try {
                const resp = await fetch('/music/api/favorites');
                const data = await resp.json();
                favorites = data.favorites || [];
                if (favorites.length === 0) {
                    area.innerHTML = '<div class="mp-empty">暂无收藏歌曲</div>';
                    return;
                }
                const songs = favorites.map(f => ({
                    id: f.song_id,
                    name: f.song_name,
                    artist: f.artist,
                    album: f.album,
                    cover: f.cover_url,
                    duration: f.duration
                }));
                currentPlaylist = songs;
                area.innerHTML = `<div class="mp-song-list">${renderSongRows(songs)}</div>`;
            } catch (e) {
                area.innerHTML = '<div class="mp-empty">加载失败</div>';
            }
        }

        async function toggleFavorite(song) {
            const isFav = favorites.some(f => f.song_id === song.id);
            try {
                const resp = await fetch('/music/api/favorites', {
                    method: isFav ? 'DELETE' : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ song_id: song.id })
                });
                const data = await resp.json();
                if (data.success) {
                    if (isFav) favorites = favorites.filter(f => f.song_id !== song.id);
                    else favorites.push({ song_id: song.id, song_name: song.name, artist: song.artist, album: song.album, cover_url: song.cover, duration: song.duration });
                    refreshFavoriteIcons();
                    if (currentPage === 'favorites') await loadFavorites();
                }
            } catch (e) { console.error('收藏操作失败', e); }
        }

        function refreshFavoriteIcons() {
            document.querySelectorAll('.fav-btn').forEach(btn => {
                const sid = btn.dataset.sid;
                const isFav = favorites.some(f => String(f.song_id) === String(sid));
                btn.classList.toggle('favorited', isFav);
                btn.innerHTML = isFav
                    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="#ef4444" stroke="#ef4444" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'
                    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
            });
        }

        // ==================== 播放历史 ====================
        async function renderHistory() {
            contentEl.innerHTML = `
                <div class="mp-page-title">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    播放历史
                </div>
                <div id="histArea"></div>
            `;
            try {
                const resp = await fetch('/music/api/history');
                const data = await resp.json();
                const history = data.history || [];
                if (history.length === 0) {
                    document.getElementById('histArea').innerHTML = '<div class="mp-empty">暂无播放记录</div>';
                    return;
                }
                document.getElementById('histArea').innerHTML = `
                    <div class="mp-song-list">
                        ${history.map((h, i) => `
                            <div class="mp-song-row" style="grid-template-columns:40px 1fr 140px;">
                                <div class="idx">${i + 1}</div>
                                <div class="row-name">${h.song_name}</div>
                                <div class="row-artist">${h.artist}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (e) {
                document.getElementById('histArea').innerHTML = '<div class="mp-empty">加载失败</div>';
            }
        }

        // ==================== 歌曲行渲染 ====================
        function renderSongRows(songs, inPlaylist = false, playlistId = null) {
            if (!songs || songs.length === 0) return '<div class="mp-empty">暂无歌曲</div>';
            return songs.map((song, i) => {
                const isFav = favorites.some(f => f.song_id === song.id);
                const isPlaying = currentSong && currentSong.id === song.id;
                return `
                    <div class="mp-song-row ${isPlaying ? 'playing' : ''}" onclick='playSong(${JSON.stringify(song).replace(/'/g, "&#39;")}, ${JSON.stringify(songs).replace(/'/g, "&#39;")})'>
                        <div class="idx">${isPlaying ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="5" height="16"/><rect x="15" y="4" width="5" height="16"/></svg>' : (i + 1)}</div>
                        <img class="row-cover" src="${song.cover || ''}" alt="" onerror="this.style.visibility='hidden'">
                        <div>
                            <div class="row-name">${song.name}</div>
                            <div class="row-artist">${song.artist}</div>
                        </div>
                        <div class="row-artist">${song.album || ''}</div>
                        <div class="row-duration">${formatTime(song.duration)}</div>
                        <button class="row-btn fav-btn ${isFav ? 'favorited' : ''}" data-sid="${song.id}" onclick="event.stopPropagation();toggleFavorite(${JSON.stringify(song).replace(/'/g, "&#39;")})">
                            ${isFav
                                ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="#ef4444" stroke="#ef4444" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'
                                : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>'
                            }
                        </button>
                        ${inPlaylist
                            ? `<button class="row-btn" onclick="event.stopPropagation();removeFromPlaylist(${song.id}, ${playlistId})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`
                            : `<button class="row-btn" onclick="event.stopPropagation();showAddToPlaylistModal(${JSON.stringify(song).replace(/'/g, "&#39;")})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></button>`
                        }
                    </div>
                `;
            }).join('');
        }

        // ==================== 播放核心 ====================
        async function playSong(song, playlist) {
            if (!song) return;
            currentSong = song;
            if (playlist) currentPlaylist = playlist;
            currentSongIndex = currentPlaylist.findIndex(s => s.id === song.id);
            if (currentSongIndex < 0) currentSongIndex = 0;

            // 更新页面UI
            updatePlayerUI(song);
            document.querySelectorAll('.mp-song-row').forEach(row => row.classList.remove('playing'));
            refreshFavoriteIcons();

            // 通过 floatingPlayer 播放
            if (window.floatingPlayer) {
                const fp = window.floatingPlayer;
                fp.currentSong = song;
                fp.playlist = currentPlaylist;
                fp.currentIndex = currentSongIndex;
                fp.audio.src = `/music/api/audio_proxy/${song.id}`;
                fp.audio.play().then(() => {
                    fp.isPlaying = true;
                    fp.updateUI();
                    fp.showPlayer();
                    fp.saveState();
                }).catch(e => console.error('播放失败:', e));
            }

            // 加载歌词
            loadLyric(song.id);

            // 记录历史
            fetch('/music/api/history', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ song_id: song.id, song_name: song.name, artist: song.artist })
            }).catch(() => {});
        }

        function updatePlayerUI(song) {
            const el = (id) => document.getElementById(id);
            if (el('detailName')) el('detailName').textContent = song.name;
            if (el('detailArtist')) el('detailArtist').textContent = song.artist;
            if (el('detailAlbum')) el('detailAlbum').textContent = song.album || '';
            if (el('detailCover')) el('detailCover').src = song.cover || '';
        }

        function togglePlay() {
            if (window.floatingPlayer) {
                window.floatingPlayer.togglePlay();
            }
        }

        function playPrev() {
            if (currentPlaylist.length === 0) return;
            let idx;
            if (playMode === 'random') idx = Math.floor(Math.random() * currentPlaylist.length);
            else idx = (currentSongIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
            playSong(currentPlaylist[idx]);
        }

        function playNext() {
            if (currentPlaylist.length === 0) return;
            let idx;
            if (playMode === 'random') idx = Math.floor(Math.random() * currentPlaylist.length);
            else idx = (currentSongIndex + 1) % currentPlaylist.length;
            playSong(currentPlaylist[idx]);
        }

        function togglePlayMode() {
            const modes = ['order', 'random', 'single'];
            const idx = modes.indexOf(playMode);
            playMode = modes[(idx + 1) % modes.length];
            // 同步到 floatingPlayer
            if (window.floatingPlayer) {
                if (playMode === 'single') window.floatingPlayer.repeatMode = 'one';
                else if (playMode === 'random') window.floatingPlayer.isShuffle = true;
                else { window.floatingPlayer.repeatMode = 'off'; window.floatingPlayer.isShuffle = false; }
            }
        }

        // ==================== 进度条与音量 ====================
        // 标记当前页面是否仍然活跃（AJAX导航离开后变为false）
        let pageActive = true;

        let _uiPollTimer = null;
        function startUIPoll() {
            stopUIPoll();
            _uiPollTimer = setInterval(() => {
                if (!pageActive) return;
                const fp = window.floatingPlayer;
                if (!fp || !fp.audio) return;
                const a = fp.audio;
                // 更新详情面板中的进度（如果有）
                if (a.duration) {
                    const pf = document.getElementById('progressFill');
                    if (pf) pf.style.width = (a.currentTime / a.duration) * 100 + '%';
                    const ct = document.getElementById('currentTime');
                    if (ct) ct.textContent = formatTime(a.currentTime);
                    const tt = document.getElementById('totalTime');
                    if (tt) tt.textContent = formatTime(a.duration);
                }
                // 歌词滚动
                updateLyric();
            }, 250);
        }
        function stopUIPoll() {
            if (_uiPollTimer) { clearInterval(_uiPollTimer); _uiPollTimer = null; }
        }

        document.getElementById('progressBar')?.addEventListener('click', (e) => {
            const a = window.floatingPlayer ? window.floatingPlayer.audio : null;
            if (!a || !a.duration) return;
            const rect = e.currentTarget.getBoundingClientRect();
            a.currentTime = a.duration * ((e.clientX - rect.left) / rect.width);
        });

        document.getElementById('volumeSlider')?.addEventListener('input', (e) => {
            if (window.floatingPlayer) window.floatingPlayer.audio.volume = e.target.value / 100;
        });

        // ==================== 歌词 ====================
        async function loadLyric(songId) {
            lyrics = [];
            const container = document.getElementById('lyricContainer');
            container.innerHTML = '<div class="mp-lyric-empty">加载歌词...</div>';
            try {
                const resp = await fetch('/music/api/lyric?id=' + songId);
                const data = await resp.json();
                if (data.lrc && data.lrc.lyric) {
                    lyrics = parseLRC(data.lrc.lyric);
                    if (lyrics.length > 0) {
                        container.innerHTML = lyrics.map((l, i) => `<div class="mp-lyric-line" data-idx="${i}">${l.text}</div>`).join('');
                    } else {
                        container.innerHTML = '<div class="mp-lyric-empty">暂无歌词</div>';
                    }
                } else {
                    container.innerHTML = '<div class="mp-lyric-empty">暂无歌词</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="mp-lyric-empty">暂无歌词</div>';
            }
        }

        function parseLRC(lrcText) {
            if (!lrcText) return [];
            const lines = lrcText.split('\n');
            const result = [];
            const regex = /^\[(\d{2}):(\d{2})\.(\d{2,3})\](.*)$/;
            for (const line of lines) {
                const match = line.match(regex);
                if (match) {
                    const min = parseInt(match[1]);
                    const sec = parseInt(match[2]);
                    const ms = parseInt(match[3].padEnd(3, '0'));
                    const time = min * 60 + sec + ms / 1000;
                    const text = match[4].trim();
                    if (text) result.push({ time, text });
                }
            }
            return result.sort((a, b) => a.time - b.time);
        }

        function updateLyric() {
            if (lyrics.length === 0) return;
            const a = window.floatingPlayer ? window.floatingPlayer.audio : document.getElementById('audioPlayer');
            if (!a) return;
            const current = a.currentTime;
            let activeIdx = -1;
            for (let i = 0; i < lyrics.length; i++) {
                if (current >= lyrics[i].time) activeIdx = i;
                else break;
            }
            if (activeIdx < 0) return;
            document.querySelectorAll('.mp-lyric-line').forEach((el, i) => {
                el.classList.toggle('active', i === activeIdx);
            });
            const activeEl = document.querySelector(`.mp-lyric-line[data-idx="${activeIdx}"]`);
            if (activeEl) {
                activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // ==================== 播放详情面板 ====================
        function toggleDetailPanel(show) {
            if (show === undefined) show = !detailPanel.classList.contains('show');
            detailPanel.classList.toggle('show', show);
        }

        // ==================== 弹窗 ====================
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // ==================== 工具函数 ====================
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '00:00';
            const s = Math.floor(seconds);
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return m.toString().padStart(2, '0') + ':' + sec.toString().padStart(2, '0');
        }

        // ==================== 初始化 ====================
        async function init() {
            await loadFavorites();
            await loadPlaylists();
            switchPage('recommend');
            startUIPoll();
            // 监听页面离开
            window.addEventListener('pageNavigated', () => { pageActive = false; stopUIPoll(); });
        }

        init();
    </script>
</body>
