<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片画廊 - 娱乐板块</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .gallery-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .gallery-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .gallery-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .control-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--gray);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .gallery-scroll-container {
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            height: calc(100vh - 200px);
            min-height: 500px;
        }

        .gallery-scroll {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 20px;
            overflow-y: auto;
            height: 100%;
            align-content: flex-start;
        }

        .gallery-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .gallery-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .gallery-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .gallery-item {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.02);
            flex-shrink: 0;
        }

        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-item-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px 12px 12px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.7), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .gallery-item-overlay {
            opacity: 1;
        }

        .gallery-item-title {
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* 全屏查看模式 */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lightbox-img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
        }

        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%) scale(1.1);
        }

        .lightbox-prev {
            left: 20px;
        }

        .lightbox-next {
            right: 20px;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1.2rem;
            z-index: 10;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .lightbox-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-size: 0.9rem;
            text-align: center;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--gray);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .refresh-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            color: var(--gray);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 5;
        }

        .refresh-indicator .dot {
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .crawling-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 20px;
            color: #fbbf24;
            font-size: 0.8rem;
            display: none;
            align-items: center;
            gap: 8px;
            z-index: 5;
        }

        .crawling-indicator.active {
            display: flex;
        }

        .crawling-indicator .spinner-small {
            width: 14px;
            height: 14px;
            border: 2px solid rgba(251, 191, 36, 0.2);
            border-top-color: #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="app-page">
    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="sidebar-title">悦己</span>
        </div>

        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard') }}" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                    <polyline points="9 22 9 12 15 12 15 22"/>

            <a href="{{ url_for('entertainment') }}" class="nav-item">

            </a>
            <a href="{{ url_for('profile') }}" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>

            </a>
            {% if session.get('role') == 'admin' %}
            <a href="{{ url_for('admin') }}" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                <span>管理面板</span>
            </a>
            {% endif %}
        </nav>

        <div class="sidebar-footer">
            <a href="{{ url_for('logout') }}" class="nav-item logout-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                <span>退出登录</span>
            </a>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 顶部栏 -->
        <header class="top-bar">
            <div class="top-bar-left">
                <a href="{{ url_for('entertainment') }}" class="back-link" style="display: inline-flex; align-items: center; gap: 8px; color: var(--gray); text-decoration: none; margin-bottom: 0;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    返回娱乐板块
                </a>
            </div>
            <div class="top-bar-right">
                <div class="user-badge" style="background: {{ session.get('avatar_color', '#6366f1') }}">
                    {{ session.get('username', 'U')[0].upper() }}
                </div>
            </div>
        </header>

        <div class="gallery-header">
            <h2>图片画廊</h2>
            <div class="gallery-controls">
                <button class="control-btn" onclick="changePreferences()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                    更改偏好
                </button>
                <button class="control-btn" onclick="manualRefresh()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10"/>
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                    </svg>
                    刷新图片
                </button>
            </div>
        </div>

        <div class="gallery-scroll-container">
            <div class="crawling-indicator" id="crawlingIndicator">
                <div class="spinner-small"></div>
                <span>正在后台下载匹配的图片，请稍后刷新...</span>
            </div>
            <div class="gallery-scroll" id="galleryScroll">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <span>正在加载图片...</span>
                </div>
            </div>
        </div>
    </main>

    <!-- 全屏查看 Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)">✕</button>
        <button class="lightbox-nav lightbox-prev" onclick="navigateImage(-1, event)">‹</button>
        <button class="lightbox-nav lightbox-next" onclick="navigateImage(1, event)">›</button>
        <div class="lightbox-content">
            <img class="lightbox-img" id="lightboxImg" src="" alt="">
        </div>
        <div class="lightbox-info" id="lightboxInfo">
            <span id="lightboxTitle"></span>
            <span style="opacity: 0.6; margin-left: 12px;">(<span id="lightboxIndex">1</span> / <span id="lightboxTotal">24</span>)</span>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div id="toast" class="toast"></div>

    <script>
        // 进入子页面时自动隐藏侧边栏 - 先显示再平滑滑出
        document.addEventListener('DOMContentLoaded', function() {
            document.body.classList.remove('sidebar-hidden');
            setTimeout(function() {
                document.body.classList.add('sidebar-hidden');
            }, 300);
        });

        let images = [];
        let currentImageIndex = 0;
        let refreshInterval = null;
        let nextRefreshTime = 0;
        let currentSource = 'picsum'; // 'picsum' or 'local'
        let pollTimer = null; // 轮询定时器

        // 加载图片
        async function loadImages() {
            const galleryScroll = document.getElementById('galleryScroll');
            const crawlingIndicator = document.getElementById('crawlingIndicator');
            galleryScroll.innerHTML = `
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <span>正在加载图片...</span>
                </div>
            `;
            crawlingIndicator.classList.remove('active');
            stopPolling(); // 停止之前的轮询

            try {
                const response = await fetch('/gallery/api/images');
                const data = await response.json();

                if (data.success) {
                    images = data.images;
                    currentSource = data.source || 'picsum';
                    renderGallery();

                    // 如果是 picsum 占位图，显示后台爬取提示并开始轮询
                    if (currentSource === 'picsum') {
                        crawlingIndicator.classList.add('active');
                        showToast('正在后台下载匹配您偏好的图片，完成后自动刷新', 'info');
                        startPolling();
                    }
                } else {
                    galleryScroll.innerHTML = `
                        <div class="empty-state" style="padding: 60px; text-align: center;">
                            <p style="color: var(--gray);">加载失败: ${data.message}</p>
                        </div>
                    `;
                }
            } catch (err) {
                galleryScroll.innerHTML = `
                    <div class="empty-state" style="padding: 60px; text-align: center;">
                        <p style="color: var(--gray);">加载失败，请检查网络连接</p>
                    </div>
                `;
            }
        }

        // 开始轮询后台状态
        function startPolling() {
            stopPolling();
            pollTimer = setInterval(async () => {
                try {
                    const response = await fetch('/gallery/api/status');
                    const data = await response.json();

                    if (data.success && data.all_done) {
                        // 后台完成，自动刷新图片
                        stopPolling();
                        showToast('后台下载完成，自动刷新中...', 'success');
                        loadImages(); // 重新加载，此时会返回本地图片
                    }
                } catch (err) {
                    // 忽略轮询错误
                }
            }, 3000); // 每3秒检查一次
        }

        // 停止轮询
        function stopPolling() {
            if (pollTimer) {
                clearInterval(pollTimer);
                pollTimer = null;
            }
        }

        // 渲染画廊
        function renderGallery() {
            const galleryScroll = document.getElementById('galleryScroll');
            galleryScroll.innerHTML = '';

            images.forEach((img, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                // 随机大小
                const sizeClass = getRandomSize();
                item.style.width = sizeClass.width;
                item.style.height = sizeClass.height;
                item.innerHTML = `
                    <img src="${img.url}" alt="${img.title}" loading="lazy" onload="this.style.opacity=1" style="opacity: 0; transition: opacity 0.5s ease;">
                    <div class="gallery-item-overlay">
                        <div class="gallery-item-title">${img.title}</div>
                    </div>
                `;
                item.onclick = () => openLightbox(index);
                galleryScroll.appendChild(item);
            });
        }

        // 获取随机大小
        function getRandomSize() {
            const sizes = [
                { width: 'calc(25% - 9px)', height: '200px' },
                { width: 'calc(33.333% - 8px)', height: '250px' },
                { width: 'calc(50% - 6px)', height: '300px' },
                { width: 'calc(25% - 9px)', height: '280px' },
                { width: 'calc(33.333% - 8px)', height: '180px' },
                { width: 'calc(50% - 6px)', height: '220px' },
            ];
            return sizes[Math.floor(Math.random() * sizes.length)];
        }

        // 打开全屏查看
        function openLightbox(index) {
            currentImageIndex = index;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxTitle = document.getElementById('lightboxTitle');
            const lightboxIndex = document.getElementById('lightboxIndex');
            const lightboxTotal = document.getElementById('lightboxTotal');

            const img = images[index];
            lightboxImg.src = img.url;
            lightboxTitle.textContent = img.title;
            lightboxIndex.textContent = index + 1;
            lightboxTotal.textContent = images.length;

            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // 关闭全屏查看
        function closeLightbox(event) {
            if (event.target.id === 'lightbox' || event.target.classList.contains('lightbox-close')) {
                const lightbox = document.getElementById('lightbox');
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        // 切换图片
        function navigateImage(direction, event) {
            event.stopPropagation();
            currentImageIndex += direction;

            if (currentImageIndex < 0) {
                currentImageIndex = images.length - 1;
            } else if (currentImageIndex >= images.length) {
                currentImageIndex = 0;
            }

            const lightboxImg = document.getElementById('lightboxImg');
            const lightboxTitle = document.getElementById('lightboxTitle');
            const lightboxIndex = document.getElementById('lightboxIndex');

            const img = images[currentImageIndex];
            lightboxImg.style.opacity = '0';

            setTimeout(() => {
                lightboxImg.src = img.url;
                lightboxTitle.textContent = img.title;
                lightboxIndex.textContent = currentImageIndex + 1;
                lightboxImg.style.opacity = '1';
            }, 200);
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;

            if (e.key === 'Escape') {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            } else if (e.key === 'ArrowLeft') {
                navigateImage(-1, { stopPropagation: () => {} });
            } else if (e.key === 'ArrowRight') {
                navigateImage(1, { stopPropagation: () => {} });
            }
        });

        // 滚轮切换图片
        document.addEventListener('wheel', (e) => {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;

            e.preventDefault();

            // 防止快速滚动导致切换过快
            if (lightbox.dataset.scrolling === 'true') return;
            lightbox.dataset.scrolling = 'true';

            // deltaY > 0 向下滚动，显示下一张；deltaY < 0 向上滚动，显示上一张
            if (e.deltaY > 0) {
                navigateImage(1, { stopPropagation: () => {} });
            } else {
                navigateImage(-1, { stopPropagation: () => {} });
            }

            // 300ms 内禁止再次切换
            setTimeout(() => {
                lightbox.dataset.scrolling = 'false';
            }, 300);
        }, { passive: false });

        // 手动刷新 - 调用刷新API清空缓存并重新爬取
        async function manualRefresh() {
            const galleryScroll = document.getElementById('galleryScroll');
            const crawlingIndicator = document.getElementById('crawlingIndicator');

            galleryScroll.innerHTML = `
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <span>正在刷新图片...</span>
                </div>
            `;

            try {
                const response = await fetch('/gallery/api/refresh', {method: 'POST'});
                const data = await response.json();

                if (data.success) {
                    images = data.images;
                    currentSource = data.source || 'picsum';
                    renderGallery();
                    crawlingIndicator.classList.add('active');
                    showToast('正在后台下载新图片，完成后自动刷新', 'info');
                    startPolling(); // 启动轮询，完成后自动刷新
                } else {
                    galleryScroll.innerHTML = `
                        <div class="empty-state" style="padding: 60px; text-align: center;">
                            <p style="color: var(--gray);">刷新失败: ${data.message}</p>
                        </div>
                    `;
                }
            } catch (err) {
                galleryScroll.innerHTML = `
                    <div class="empty-state" style="padding: 60px; text-align: center;">
                        <p style="color: var(--gray);">刷新失败，请检查网络连接</p>
                    </div>
                `;
            }
        }

        // 更改偏好
        function changePreferences() {
            window.location.href = '/gallery/prefs';
        }

        // 显示 Toast
        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadImages();
        });
    </script>
    <script src="{{ url_for('static', filename='js/floating_player.js') }}"></script>
    <script src="{{ url_for('static', filename='js/ajax_nav.js') }}"></script>
</body>
</html>
